name: Deploy to production
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  # Step 1: Build in CI first — catch errors BEFORE touching production
  build-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci --no-audit --no-fund

      # Guard 1: every page under src/pages/{compare,reviews,guides} MUST use
      # the shared Base layout. Standalone <html><body> pages skip the site
      # header, navigation and dark theme, so visitors see a broken page.
      # Reject the build if any orphans sneak in.
      - name: Check pages use Base layout
        run: |
          ORPHANS=$(for f in src/pages/compare/*.astro src/pages/reviews/*.astro src/pages/guides/*.astro; do
            [ -f "$f" ] || continue
            if ! grep -q 'import.*Base\|layout:.*Base\|<Base' "$f" && grep -q '<!DOCTYPE\|<html' "$f"; then
              echo "$f"
            fi
          done)
          if [ -n "$ORPHANS" ]; then
            echo "FAIL: orphan pages (no Base layout) would render without header, nav or dark theme:"
            echo "$ORPHANS"
            echo ""
            echo "Wrap each in <Base title=\"...\" description=\"...\"> ... </Base> instead of writing your own <html>."
            exit 1
          fi
          echo "OK: all compare/reviews/guides pages use Base layout"

      # Guard 2: critical infrastructure files must contain certain tokens.
      # If someone regenerates these files from scratch, the tokens disappear
      # and the build fails, forcing a manual review instead of a silent
      # regression.
      - name: Check critical files still contain their invariants
        run: |
          set -e
          check() {
            local file="$1"; local needle="$2"; local reason="$3"
            if ! grep -qF "$needle" "$file"; then
              echo "FAIL: $file is missing '$needle' ($reason)"
              exit 1
            fi
            echo "OK: $file contains '$needle'"
          }
          check src/pages/sitemap.xml.ts 'import.meta.glob' 'sitemap must auto-generate from filesystem, not hardcoded'
          check src/components/Footer.astro 'facebook.com/profile.php?id=61574447922784' 'footer must link the real Facebook page'
          check src/components/Footer.astro 'instagram.com/learnenglish.life' 'footer must link the real Instagram account'
          check src/pages/blog/how-long-to-learn-english.astro 'CEFR' 'reality check article must remain published'
          # index.astro must NOT contain the old email signup formspree placeholder
          if grep -q 'formspree.io/f/YOUR_FORM_ID\|Get Free English Tips Weekly' src/pages/index.astro; then
            echo "FAIL: src/pages/index.astro re-introduces the email signup block (removed on purpose)"
            exit 1
          fi
          echo "OK: critical invariants hold"

      - run: npm run build
        env:
          SITE: https://learnenglish.life

  # Step 2: Only deploy if build passed
  deploy:
    needs: build-check
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH (with rollback safety)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script_stop: true
          command_timeout: 10m
          script: |
            set -eo pipefail
            cd /var/www/learnenglish.life
            export PATH=$HOME/.nvm/versions/node/v22*/bin:/usr/local/bin:/usr/bin:/bin

            # Backup current working dist before touching anything
            if [ -d dist ]; then
              rm -rf dist_backup
              cp -r dist dist_backup
              echo "Backed up current dist ($(ls dist | wc -l) files)"
            fi

            # Pull new code
            git fetch --all --quiet
            git reset --hard origin/main

            # Install deps
            npm ci --no-audit --no-fund --prefer-offline 2>&1 | tail -5

            # Build — if this fails, restore backup
            if npm run build 2>&1 | tail -20; then
              echo "Build OK — $(ls dist | wc -l) files generated"
              rm -rf dist_backup
              echo "Deploy OK at $(date -u +%FT%TZ)"
            else
              echo "BUILD FAILED — restoring previous dist"
              if [ -d dist_backup ]; then
                rm -rf dist
                mv dist_backup dist
                echo "Rollback complete — site restored to previous version"
              fi
              exit 1
            fi
